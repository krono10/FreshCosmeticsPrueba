<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freshly Admin | Banner Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <div id="toast-container" class="fixed top-5 right-5 z-[100] flex flex-col gap-3"></div>

    <div id="confirm-modal" class="fixed inset-0 bg-slate-900/50 hidden z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl animate-fadeIn">
            <div class="text-center">
                <div class="bg-red-100 text-red-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                    <i class="fa-solid fa-trash-can"></i>
                </div>
                <h3 class="text-xl font-bold text-slate-800 mb-2">¿Estás seguro?</h3>
                <p class="text-slate-500 mb-6">Esta acción no se puede deshacer. El banner se eliminará permanentemente.</p>
                <div class="flex gap-3">
                    <button onclick="closeConfirm()" class="flex-1 px-4 py-2 bg-slate-100 text-slate-600 rounded-xl font-bold hover:bg-slate-200 transition">Cancelar</button>
                    <button id="confirm-delete-btn" class="flex-1 px-4 py-2 bg-red-500 text-white rounded-xl font-bold hover:bg-red-600 transition">Eliminar</button>
                </div>
            </div>
        </div>
    </div>

    <nav class="bg-white shadow-sm border-b mb-8 p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-emerald-600 flex items-center gap-2">
                <i class="fa-solid fa-leaf"></i> Freshly Admin
            </h1>
            <button onclick="openModal()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded-lg font-medium transition flex items-center gap-2">
                <i class="fa-solid fa-plus"></i> Nuevo Banner
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4">
        <div id="banner-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <div id="modal" class="fixed inset-0 bg-slate-900/50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto animate-fadeIn">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50 rounded-t-2xl">
                <h2 id="modal-title" class="text-xl font-bold text-slate-800">Gestionar Banner</h2>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
            </div>
            
            <form id="banner-form" class="p-6 space-y-4">
                <input type="hidden" id="banner-id">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Nombre Interno</label>
                        <input type="text" id="internal_name" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-emerald-500 outline-none" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Color de Fondo</label>
                        <input type="color" id="bg_color" class="w-full h-10 border rounded-lg cursor-pointer">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Fecha Inicio</label>
                        <input type="datetime-local" id="start_date" class="w-full border rounded-lg p-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Fecha Fin</label>
                        <input type="datetime-local" id="end_date" class="w-full border rounded-lg p-2">
                    </div>
                </div>
                <div class="border-t pt-4">
                    <div class="flex justify-between items-center mb-4">
                        <label class="font-bold text-slate-800 italic text-sm">Contenido por Idioma</label>
                        <button type="button" onclick="addLanguageRow()" class="text-xs bg-slate-200 hover:bg-slate-300 px-3 py-1 rounded-full transition">+ Añadir Idioma</button>
                    </div>
                    <div id="languages-container" class="space-y-3"></div>
                </div>
                <div class="pt-6 flex gap-3">
                    <button type="button" onclick="closeModal()" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 rounded-xl transition">Cancelar</button>
                    <button type="submit" id="save-btn" class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-emerald-200 flex items-center justify-center gap-2">
                        <span>Guardar Cambios</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        const API_URL = 'index.php/api/banners';
        let allBanners = [];
        let deleteTargetId = null;

        // --- UTILS: TOASTS ---
        window.showToast = (msg, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = type === 'success' ? 'bg-emerald-500' : 'bg-red-500';
            const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
            
            toast.className = `${colors} text-white px-6 py-3 rounded-xl shadow-lg flex items-center gap-3 animate-fadeIn mb-2`;
            toast.innerHTML = `<i class="fa-solid ${icon}"></i> <span>${msg}</span>`;
            
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-x-full', 'transition', 'duration-500');
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        };

        // --- UTILS: FECHAS ---
        const formatDateTime = (dateObj) => {
            if (!dateObj || !dateObj.date) return "";
            return dateObj.date.substring(0, 10) + 'T' + dateObj.date.substring(11, 16);
        };

        // --- MODAL CONTROL ---
        window.openModal = (id = null) => {
            const modal = document.getElementById('modal');
            const form = document.getElementById('banner-form');
            const container = document.getElementById('languages-container');
            
            form.reset();
            container.innerHTML = '';
            document.getElementById('banner-id').value = id || '';
            document.getElementById('modal-title').innerText = id ? 'Editar Banner' : 'Nuevo Banner';

            if (id) {
                const banner = allBanners.find(b => b.id === id);
                document.getElementById('internal_name').value = banner.name;
                document.getElementById('bg_color').value = banner.bg_color;
                document.getElementById('start_date').value = formatDateTime(banner.start_date);
                document.getElementById('end_date').value = formatDateTime(banner.end_date);
                Object.entries(banner.content).forEach(([lang, text]) => addLanguageRow(lang, text));
            } else {
                addLanguageRow('es', '');
            }
            modal.classList.remove('hidden');
        };

        window.closeModal = () => document.getElementById('modal').classList.add('hidden');

        // --- CONFIRM DELETE MODAL ---
        window.deleteBanner = (id) => {
            deleteTargetId = id;
            document.getElementById('confirm-modal').classList.remove('hidden');
        };

        window.closeConfirm = () => {
            deleteTargetId = null;
            document.getElementById('confirm-modal').classList.add('hidden');
        };

        document.getElementById('confirm-delete-btn').addEventListener('click', async () => {
            if (!deleteTargetId) return;
            try {
                const res = await fetch(`${API_URL}/${deleteTargetId}`, { method: 'DELETE' });
                if (res.ok) {
                    showToast("Banner eliminado con éxito");
                    fetchBanners();
                } else {
                    showToast("Error al eliminar", "error");
                }
            } catch (err) { showToast("Error de conexión", "error"); }
            closeConfirm();
        });

        // --- GESTIÓN IDIOMAS ---
        window.addLanguageRow = (lang = '', text = '') => {
            const container = document.getElementById('languages-container');
            const div = document.createElement('div');
            div.className = "flex gap-2 items-center animate-fadeIn";
            div.innerHTML = `
                <input type="text" placeholder="es" value="${lang}" class="w-16 border rounded-lg p-2 text-center font-mono text-sm lang-key" required>
                <input type="text" placeholder="Texto del banner..." value="${text}" class="flex-1 border rounded-lg p-2 lang-val" required>
                <button type="button" onclick="this.parentElement.remove()" class="text-slate-300 hover:text-red-500 transition px-2">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            `;
            container.appendChild(div);
        };

        // --- API CALLS ---
        const fetchBanners = async () => {
            const grid = document.getElementById('banner-grid');
            try {
                const response = await fetch(API_URL);
                allBanners = await response.json();
                renderGrid();
            } catch (err) { showToast("Error al cargar banners", "error"); }
        };

        const renderGrid = () => {
            const grid = document.getElementById('banner-grid');
            grid.innerHTML = allBanners.length ? '' : `
                <div class="col-span-full text-center py-20">
                    <i class="fa-solid fa-box-open text-5xl text-slate-200 mb-4"></i>
                    <p class="text-slate-400">No hay banners configurados.</p>
                </div>`;

            allBanners.forEach(banner => {
                const lang = navigator.language.startsWith('en') ? 'en' : 'es';
                const text = banner.content[lang] || Object.values(banner.content)[0] || '---';

                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-xl transition-all duration-300 group";
                card.innerHTML = `
                    <div class="h-28 flex items-center justify-center p-4 text-center text-white font-bold text-lg" style="background-color: ${banner.bg_color}">
                        ${text}
                    </div>
                    <div class="p-4 flex justify-between items-center">
                        <div class="truncate mr-2">
                            <p class="text-sm font-bold text-slate-800 truncate">${banner.name}</p>
                            <p class="text-[10px] text-slate-400 font-mono italic">${banner.id.substring(0,8)}...</p>
                        </div>
                        <div class="flex gap-1 shrink-0">
                            <button onclick="openModal('${banner.id}')" class="w-9 h-9 flex items-center justify-center bg-slate-50 text-slate-400 hover:bg-emerald-50 hover:text-emerald-500 transition rounded-xl">
                                <i class="fa-solid fa-pen"></i>
                            </button>
                            <button onclick="deleteBanner('${banner.id}')" class="w-9 h-9 flex items-center justify-center bg-slate-50 text-slate-400 hover:bg-red-50 hover:text-red-500 transition rounded-xl">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        };

        document.getElementById('banner-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const saveBtn = document.getElementById('save-btn');
            const id = document.getElementById('banner-id').value;
            
            // Loading state
            saveBtn.disabled = true;
            saveBtn.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin"></i> <span>Guardando...</span>`;

            const content = {};
            document.querySelectorAll('#languages-container > div').forEach(row => {
                const k = row.querySelector('.lang-key').value.toLowerCase();
                const v = row.querySelector('.lang-val').value;
                if(k && v) content[k] = v;
            });

            const payload = {
                internal_name: document.getElementById('internal_name').value,
                active: true,
                background_color: document.getElementById('bg_color').value,
                start_date: document.getElementById('start_date').value || null,
                end_date: document.getElementById('end_date').value || null,
                content: content
            };

            try {
                const method = id ? 'PUT' : 'POST';
                const url = id ? `${API_URL}/${id}` : API_URL;
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    showToast(id ? "Banner actualizado" : "¡Banner creado con éxito!");
                    closeModal();
                    fetchBanners();
                } else {
                    showToast("Error al procesar la solicitud", "error");
                }
            } catch (err) { showToast("Error de conexión", "error"); }
            
            saveBtn.disabled = false;
            saveBtn.innerHTML = `<span>Guardar Cambios</span>`;
        });

        fetchBanners();
    </script>

    <style>
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-fadeIn { animation: fadeIn 0.2s ease-out forwards; }
    </style>
</body>
</html>
